<!doctype html>
<html data-bs-theme="dark" lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
      <meta name="theme-color" content="#0b0f14">
      <meta name="color-scheme" content="dark">
      <title>NADO Explorer · Error</title>
      <link rel="stylesheet" href="/static/explorer.css">
   </head>
   <body>
      <header class="app">
         <a class="brand" href="/">
            <div class="logo">N</div>
            <div>
               <h1>NADO Explorer</h1>
               <div class="sub">error</div>
            </div>
         </a>
         <nav class="nav">
            <a class="btn" href="https://nodeisok.com" role="button">Website</a>
            <a class="btn" href="/" role="button">Home</a>
            <a class="btn" href="/get_supply" role="button">Supply</a>
            <a class="btn" href="/stats" role="button">Stats</a>
            <a class="btn" href="{{node}}" role="button">API</a>
         </nav>
      </header>

      <div class="wrap">
         <form method="get" class="card">
            <div class="errbox">An error occurred. Please try again.</div>
            <h2 style="margin-top:14px">Search</h2>
            <label for="entry">Look up a transaction, account, block number or hash</label>
            <input aria-describedby="entryHelp" class="field" formaction="#" id="entry" name="entry"
               placeholder="Your query" required type="text">
            <small class="help" id="entryHelp">Enter whatever you are looking for and press one of the buttons.</small>
            <div class="btn-row">
               <input type="submit" hidden formaction="/automatic" />
               <button class="btn" formaction="/get_transaction" role="button">Transaction</button>
               <button class="btn" formaction="/get_account" role="button">Account</button>
               <button class="btn" formaction="/get_account_txs" role="button">Account transactions</button>
               <button class="btn" formaction="/get_block_number" role="button">Block number</button>
               <button class="btn" formaction="/get_block" role="button">Block hash</button>
            </div>
         </form>

         <footer>NADO Explorer · data served live from the node API</footer>
      </div>
   </body>
</html>
