# forum.nadochain.com -> reverse-proxy the NADO forum service (forum/server.py on 127.0.0.1:8781).
# Behind Cloudflare like the rest of nadochain.com. Additive vhost — does not touch the other sites.
#
# TLS: the cert must cover forum.nadochain.com. Expand the existing cert ONCE, then reload nginx:
#   certbot certonly --webroot -w /var/www/html --expand \
#     -d nadochain.com -d www.nadochain.com -d get.nadochain.com -d forum.nadochain.com
#   systemctl reload nginx
# Until expanded this serves the nadochain.com cert (OK behind Cloudflare "Full"; "Full (strict)" needs the SAN).

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name forum.nadochain.com;

    ssl_certificate     /etc/letsencrypt/live/nadochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nadochain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location ~ /\. { deny all; return 404; }

    client_max_body_size 256k;   # posts are small; bound the body

    location / {
        proxy_pass http://127.0.0.1:8781;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
