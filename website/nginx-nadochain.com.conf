# NADO — marketing site (nadochain.com) + interface proxy (get.nadochain.com)
#
# HTTP-only for now. Once the DNS A/AAAA records for nadochain.com, www.nadochain.com and get.nadochain.com
# point at this server, enable HTTPS with:
#   certbot --nginx -d nadochain.com -d www.nadochain.com -d get.nadochain.com
# (certbot rewrites these blocks to add the 443 listeners + a 80->443 redirect).

# --- marketing site -------------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name nadochain.com www.nadochain.com;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location ~ /\. { deny all; return 404; }

    # send www -> apex
    if ($host = www.nadochain.com) { return 301 http://nadochain.com$request_uri; }

    root /var/www/nadochain.com;
    index index.html;
    location / { try_files $uri $uri/ =404; }
}

# --- get.nadochain.com: reverse-proxy the whole NADO node (interface + L1 API + exec/shielded) -----
server {
    listen 80;
    listen [::]:80;
    server_name get.nadochain.com;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }

    # shielded-pool / execution node on :9273 (on-device proofs can be several MB)
    location /exec/ {
        proxy_pass http://127.0.0.1:9273;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 20m;
    }

    # everything else -> the L1 node on :9173 (/ redirects to /static/interface.html; also serves the JSON API)
    location / {
        proxy_pass http://127.0.0.1:9173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 20m;
    }
}
