# NADO — marketing site (nadochain.com) + interface proxy (get.nadochain.com)
#
# Behind Cloudflare (proxied). The origin serves the SAME content on :80 and :443 (no origin-side HTTP->HTTPS
# redirect), so there's no redirect loop regardless of the Cloudflare SSL/TLS mode; Cloudflare handles the
# public HTTP->HTTPS. Recommended Cloudflare mode: "Full (strict)" — the origin has a valid Let's Encrypt cert.
#
# Cert: certbot certonly --webroot -w /var/www/html -d nadochain.com -d www.nadochain.com -d get.nadochain.com

# ================= marketing site =================
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nadochain.com www.nadochain.com;

    ssl_certificate     /etc/letsencrypt/live/nadochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nadochain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location ~ /\. { deny all; return 404; }

    if ($host = www.nadochain.com) { return 301 https://nadochain.com$request_uri; }

    root /var/www/nadochain.com;
    index index.html;
    # clean URLs: /emission serves emission.html; legacy /<page>.html 301s to /<page>
    # (index.html excluded — its canonical URL is /). Relative Location: behind Cloudflare the
    # origin is plain HTTP, so an absolute redirect would bounce https visitors through http.
    absolute_redirect off;
    location ~ ^/(?!index)(?<page>[a-z0-9-]+)\.html$ { return 301 /$page; }
    location / { try_files $uri $uri/ $uri.html =404; }
}

# ================= get.nadochain.com -> reverse-proxy the NADO node =================
server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name get.nadochain.com;

    ssl_certificate     /etc/letsencrypt/live/nadochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nadochain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }

    # shielded-pool / execution node on :9273 (on-device proofs can be several MB)
    location /exec/ {
        proxy_pass http://127.0.0.1:9273;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 20m;
    }

    # DA layer on :9273 (erasure-coded shielded-transfer proofs are ~1-4 MB; the wallet publishes/fetches here)
    location /da/ {
        proxy_pass http://127.0.0.1:9273;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 20m;
    }

    # serve the interface AT the domain root so the address bar stays get.nadochain.com/ (no redirect to
    # /static/interface.html). Assets (/static/*) and the JSON API fall through to the catch-all below.
    location = / {
        proxy_pass http://127.0.0.1:9173/static/interface.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # everything else -> the L1 node on :9173 (static assets + the JSON API)
    location / {
        proxy_pass http://127.0.0.1:9173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        client_max_body_size 20m;
    }
}
