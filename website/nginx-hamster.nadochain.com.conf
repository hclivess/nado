# NADO Dice dApp — serves static/dice.html at the root and proxies the exec/DA + L1 API to the node,
# so the page is same-origin (no CORS). Behind Cloudflare (edge SSL); origin cert reused from nadochain.com.
server {
    listen 80; listen [::]:80;
    server_name hamster.nadochain.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl http2; listen [::]:443 ssl http2;
    server_name hamster.nadochain.com;
    ssl_certificate     /etc/letsencrypt/live/nadochain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nadochain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ { root /var/www/html; }

    location /exec/ { proxy_pass http://127.0.0.1:9273; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 300; client_max_body_size 20m; }
    location /da/   { proxy_pass http://127.0.0.1:9273; proxy_http_version 1.1; proxy_set_header Host $host; proxy_read_timeout 300; client_max_body_size 20m; }

    # dice page at the domain root
    location = / { proxy_pass http://127.0.0.1:9173/static/hamster.html; proxy_set_header Host $host; }

    # everything else (static assets + L1 JSON API: /status, /get_latest_block, /submit_transaction, /get_account) -> the node
    location / { proxy_pass http://127.0.0.1:9173; proxy_set_header Host $host; proxy_read_timeout 120; client_max_body_size 2m; }
}
